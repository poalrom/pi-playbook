---
# =============================================================================
# Raspberry Pi Home Server Deployment Playbook
# =============================================================================
# This playbook configures a Raspberry Pi as a secure home server following
# the comprehensive security guide. It handles both fresh installations and
# existing setups gracefully.
# =============================================================================

# =============================================================================
# Main Server Configuration Phase
# =============================================================================
- name: Configure Raspberry Pi Home Server
  hosts: raspberry-pi
  become: true
  gather_facts: true

  vars_files:
    - vault.yml

  pre_tasks:
    - name: Update package cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
      tags: ["always"]

  roles:
    - role: security-hardening
      tags: ["security"]
      # Note: User management is handled in the separate user management phase above

    - role: firewall
      tags: ["firewall"]

    - role: torrent-vpn
      tags: ["torrent"]

    - role: disk-mounting
      tags: ["disk"]

    - role: docker-setup
      tags: ["docker"]

    - role: tinymediamanager
      tags: ["tmm"]

    - role: uptime-kuma
      tags: ["kuma"]

    - role: samba-server
      tags: ["samba"]

    - role: glances
      tags: ["glances"]

    - role: home-assistant
      tags: ["home-assistant"]

    - role: frigate
      tags: ["frigate"]

    - role: rclone
      tags: ["rclone"]

    - role: immich
      when: immich_db_password != ""
      tags: ["immich"]

    - role: obsidian-livesync
      when: obsidian_livesync_db_password != ""
      tags: ["obsidian"]

    - role: vaultwarden
      tags: ["vaultwarden"]

    - role: nginx-proxy-manager
      tags: ["nginx"]

    - role: ddns-setup
      when: myaddr_api_key != ""
      tags: ["ddns"]
