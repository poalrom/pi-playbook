---
# =============================================================================
# Raspberry Pi Home Server Configuration Variables
# =============================================================================

# =============================================================================
# Common Infrastructure Parameters
# =============================================================================

# Network Configuration
network:
  local_subnet: "192.168.178.0/24"
  pi_ip: "192.168.178.112"

# User Management
users:
  admin_user: "home-pi"

# SSH Configuration
ssh:
  port: 2312
  disable_password_auth: true
  public_key_path: "~/.ssh/id_ed25519.pub"

# Firewall Rules
firewall:
  ssh_port: 2312
  allow_http: true
  allow_https: true
  samba_ports:
    udp: [137, 138]
    tcp: [139, 445]

# Fail2Ban Configuration
fail2ban:
  ssh_maxretry: 3
  ssh_bantime: "1h"
  ssh_findtime: "10m"

# External Storage
storage:
  device: "/dev/sda2"
  mount_point: "/media/pi/home"
  filesystem: "exfat-fuse"

# Placed separately to avoid recursion templating
log_directory: "{{ storage.mount_point }}/log"
shared_directory: "{{ storage.mount_point }}/samba/shared"

# Docker Configuration
docker:
  stacks_directory: "/opt/stacks"

# Security Settings
security:
  ufw_default_incoming: "deny"
  ufw_default_outgoing: "allow"
  # ufw-docker integration for Docker container firewall control
  ufw_docker_enabled: true

# System Settings
system:
  timezone: "UTC" # Change as needed
  locale: "en_US.UTF-8"

# =============================================================================
# Role-Specific Configuration Parameters
# =============================================================================

# DDNS Configuration
ddns:
  domain: "{{ ddns_domain }}"
  service_url: "https://myaddr.tools/update"
  update_interval: "hourly"

# Immich Photo Management
immich:
  port: 2283
  domain: "photo.{{ ddns_domain }}"
  public_access: true
  config_path: "{{ docker.stacks_directory }}/immich"
  library_directory: "{{ storage.mount_point }}/immich/library"
  # Placed to the main storage to avoid permission conflicts
  database_directory: "{{ docker.stacks_directory }}/immich/database"
  # Backup Configuration
  backup:
    local_directory: "{{ storage.mount_point }}/backups/immich"
    retention_days: 3
    rclone_path: "immich-backups"
    log_file: "{{ log_directory }}/immich-backup-rclone.log"

rclone:
  remote: "yandex-disk"

# Nginx Proxy Manager
nginx_proxy_manager:
  port: 81
  http_port: 80
  https_port: 443
  config_path: "{{ docker.stacks_directory }}/nginx-proxy-manager"

# Uptime Kuma Monitoring
uptime_kuma:
  port: 3001
  config_path: "{{ docker.stacks_directory }}/uptime-kuma"
  data_path: "{{ docker.stacks_directory }}/uptime-kuma/data"

# Samba File Sharing
samba:
  workgroup: "WORKGROUP"
  server_string: "Pi Home Server"
  netbios_name: "PISERVER"

# Glances System Monitoring
glances:
  port: 61208
  config_path: "{{ docker.stacks_directory }}/glances"

# Obsidian LiveSync
obsidian_livesync:
  port: 5984
  domain: "vault.{{ ddns_domain }}"
  config_path: "{{ docker.stacks_directory }}/obsidian-livesync"

# Vaultwarden Password Manager
vaultwarden:
  port: 11011
  domain: "vwdn.{{ ddns_domain }}"
  config_path: "{{ docker.stacks_directory }}/vaultwarden"
  data_path: "{{ docker.stacks_directory }}/vaultwarden/data"
  # Backup Configuration
  backup:
    local_directory: "{{ storage.mount_point }}/backups/vaultwarden"
    retention_days: 3
    rclone_path: "vaultwarden-backups"
    log_file: "{{ log_directory }}/vaultwarden-backup-rclone.log"

# Torrent VPN Configuration
torrent_vpn:
  config_path: "{{ docker.stacks_directory }}/qbittorrent"
  qbittorrent_config_path: "{{ docker.stacks_directory }}/qbittorrent/config"
  download_path: "{{ shared_directory }}/downloads"
  incomplete_path: "{{ storage.mount_point }}/torrents/incomplete"
  vpn_config_name: "myvpn"  # Name for OpenVPN service (without .conf extension)
  vpn_interface: "tun0"  # VPN interface name (auto-detect or manual)
  qbittorrent_webui_port: 8234
  # Hash of the default password "adminadmin"
  default_password: "@ByteArray(ARQ77eY1NUZaQsuDHbIMCA==:0WMRkYTUWVT9wVvdDtHAjU9b3b7uB8NR1Gur2hmQCvCDpm39Q+PsJRJPaCU51dEiz+dTzh8qbPsL8WkFljQYFQ==)"
