---
# =============================================================================
# Nginx Proxy Manager Deployment
# =============================================================================

- name: Create Nginx Proxy Manager directory
  ansible.builtin.file:
    path: "{{ nginx_proxy_manager.config_path }}"
    state: directory
    owner: "{{ users.admin_user }}"
    group: "{{ users.admin_user }}"
    mode: "0755"

- name: Create Nginx Proxy Manager data directories
  ansible.builtin.file:
    path: "{{ nginx_proxy_manager.config_path }}/{{ item }}"
    state: directory
    owner: "{{ users.admin_user }}"
    group: "{{ users.admin_user }}"
    mode: "0755"
  loop:
    - data
    - letsencrypt

- name: Create Nginx Proxy Manager docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ nginx_proxy_manager.config_path }}/compose.yml"
    owner: "{{ users.admin_user }}"
    group: "{{ users.admin_user }}"
    mode: "0644"
  notify: Restart nginx-proxy-manager

- name: Start Nginx Proxy Manager
  community.docker.docker_compose_v2:
    project_src: "{{ nginx_proxy_manager.config_path }}"
    state: present

- name: Wait for Nginx Proxy Manager to be ready
  ansible.builtin.wait_for:
    host: "{{ network.pi_ip }}"
    port: "{{ nginx_proxy_manager.port }}"
    delay: 10
    timeout: 60

- name: Download Nginx Proxy Manager Bash API
  ansible.builtin.get_url:
    url: https://raw.githubusercontent.com/Erreur32/nginx-proxy-manager-Bash-API/main/npm-api.sh
    dest: "{{ nginx_proxy_manager.config_path }}/npm-api.sh"
    mode: "0755"

- name: Create Nginx Proxy Manager npm-api.conf
  ansible.builtin.template:
    src: npm-api.conf.j2
    dest: "{{ nginx_proxy_manager.config_path }}/npm-api.conf"
    owner: "{{ users.admin_user }}"
    group: "{{ users.admin_user }}"
    mode: "0644"

- name: Add Immich to Nginx Proxy Manager # noqa: no-changed-when
  ansible.builtin.shell: |
    {{ nginx_proxy_manager.config_path }}/npm-api.sh \
    --host-create {{ immich.domain }} \
    --forward-host 127.0.0.1 \
    --forward-port {{ immich.port }} \
    -y                 # Auto confirm

- name: Add Obsidian LiveSync to Nginx Proxy Manager # noqa: no-changed-when
  ansible.builtin.shell: |
    {{ nginx_proxy_manager.config_path }}/npm-api.sh \
    --host-create {{ obsidian_livesync.domain }} \
    --forward-host 127.0.0.1 \
    --forward-port {{ obsidian_livesync.port }} \
    -y                 # Auto confirm

- name: Add Vaultwarden to Nginx Proxy Manager # noqa: no-changed-when
  ansible.builtin.shell: |
    {{ nginx_proxy_manager.config_path }}/npm-api.sh \
    --host-create {{ vaultwarden.domain }} \
    --forward-host 127.0.0.1 \
    --forward-port {{ vaultwarden.port }} \
    -y                 # Auto confirm

- name: Display Nginx Proxy Manager access information
  ansible.builtin.debug:
    msg:
      - "Nginx Proxy Manager is now running!"
      - "Access it at: http://{{ network.pi_ip }}:{{ nginx_proxy_manager.port }}"
      - "Default credentials: {{ nginx_proxy_manager_admin_email }} / {{ nginx_proxy_manager_admin_password }}"
      - "IMPORTANT: Change these credentials immediately after first login!"
      - "IMPORTANT: Don't forget to enable SSL and security options for the domains!"
