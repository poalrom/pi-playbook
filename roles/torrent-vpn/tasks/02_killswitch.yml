---
# =============================================================================
# Phase 2: Kill Switch Configuration
# =============================================================================

- name: Configure qBittorrent
  ansible.builtin.ini_file:
    path: "{{ torrent_vpn.qbittorrent_config_path }}/qBittorrent/qBittorrent.conf"
    section: "{{ item.section }}"
    option: "{{ item.option }}"
    value: "{{ item.value }}"
    owner: "{{ users.admin_user }}"
    group: "{{ users.admin_user }}"
    mode: '0644'
  with_items:
    - { section: "BitTorrent", option: "Session\\Interface", value: "tun0" }
    - { section: "BitTorrent", option: "Session\\InterfaceName", value: "tun0" }

- name: Allow WebUI access from local network
  ufw:
    rule: allow
    port: "{{ torrent_vpn.qbittorrent_webui_port }}"
    proto: tcp
    src: "{{ network.local_subnet }}"
    comment: "qBittorrent WebUI from LAN"

- name: Extract VPN remote line from config
  ansible.builtin.shell: |
    set -o pipefail && grep -E '^remote\s+' \
      /etc/openvpn/{{ torrent_vpn.vpn_config_name }}.conf | head -1
  register: vpn_remote_line_result
  changed_when: false
  failed_when: false

- name: Extract VPN proto line from config
  ansible.builtin.shell: |
    set -o pipefail && grep -E '^proto\s+' /etc/openvpn/{{ torrent_vpn.vpn_config_name }}.conf | head -1
  register: vpn_proto_line_result
  changed_when: false
  failed_when: false

- name: Parse VPN remote directive
  ansible.builtin.set_fact:
    vpn_remote_parts: "{{ vpn_remote_line_result.stdout | default('') | split() }}"
  when: vpn_remote_line_result.stdout != ""

- name: Extract VPN server details
  ansible.builtin.set_fact:
    vpn_server_host: "{{ vpn_remote_parts[1] | default('') }}"
    vpn_server_port: "{{ vpn_remote_parts[2] | default('1194') }}"
    vpn_protocol_from_remote: "{{ vpn_remote_parts[3] | default('') }}"
  when: vpn_remote_parts is defined

- name: Set VPN protocol
  ansible.builtin.set_fact:
    vpn_protocol: "{{ vpn_protocol_from_remote | default(vpn_proto_line_result.stdout | default('udp') | split() | last | default('udp')) }}"
  when: vpn_server_host is defined and vpn_server_host != ""

- name: Resolve VPN server hostname to IP
  ansible.builtin.command: "getent hosts {{ vpn_server_host }} | awk '{print $1}' | head -1"
  register: vpn_server_ip_result
  changed_when: false
  failed_when: false
  when:
    - vpn_server_host is defined
    - vpn_server_host != ""
    - vpn_server_host is not match('^[0-9]+\\.')

- name: Set VPN server IP
  ansible.builtin.set_fact:
    vpn_server_ip: "{{ vpn_server_host if (vpn_server_host is match('^[0-9]+\\.')) else (vpn_server_ip_result.stdout | default(vpn_server_host)) }}"
  when: vpn_server_host is defined and vpn_server_host != ""

- name: Check if VPN server rule exists
  ansible.builtin.command: set -o pipefail && ufw status numbered | grep -q "{{ vpn_server_ip }}"
  register: vpn_rule_check
  changed_when: false
  failed_when: false
  when: vpn_server_ip is defined and vpn_server_ip != ""

- name: Allow VPN server connection (outgoing)
  ansible.builtin.command: |
    ufw allow out to {{ vpn_server_ip }} port {{ vpn_server_port }} proto {{ vpn_protocol }} comment "OpenVPN server connection"
  when:
    - vpn_server_ip is defined
    - vpn_server_ip != ""
    - vpn_rule_check.rc != 0
  changed_when: true

- name: Check if DNS rule exists
  ansible.builtin.command: set -o pipefail && ufw status numbered | grep -q "53/udp"
  register: dns_rule_check
  changed_when: false
  failed_when: false

- name: Allow DNS for VPN resolution (outgoing)
  ansible.builtin.command: |
    ufw allow out 53/udp comment "DNS for VPN resolution"
  when: dns_rule_check.rc != 0
  changed_when: true
