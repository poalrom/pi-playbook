---
# =============================================================================
# Immich Deployment
# =============================================================================

- name: Check if external storage is mounted
  ansible.builtin.stat:
    path: "{{ storage.mount_point }}"
  register: immich_external_storage_check

- name: Verify external storage mount
  ansible.builtin.assert:
    that: immich_external_storage_check.stat.exists
    fail_msg: "External storage not found at {{ storage.mount_point }}. Please mount it first."

- name: Create Immich database directory on main drive
  ansible.builtin.file:
    path: "{{ immich.database_directory }}"
    state: directory
    owner: "{{ users.admin_user }}"
    group: "{{ users.admin_user }}"
    mode: "0755"

- name: Create Immich Docker stack directory
  ansible.builtin.file:
    path: "{{ immich.config_path }}"
    state: directory
    owner: "{{ users.admin_user }}"
    group: "{{ users.admin_user }}"
    mode: "0755"

- name: Create Immich upload directory on external storage
  ansible.builtin.file:
    path: "{{ immich.library_directory }}"
    state: directory
    owner: "{{ users.admin_user }}"
    group: "{{ users.admin_user }}"
    mode: "0755"

- name: Create Immich docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ immich.config_path }}/compose.yml"
    owner: "{{ users.admin_user }}"
    group: "{{ users.admin_user }}"
    mode: "0644"
  notify: Restart immich

- name: Create Immich environment file
  ansible.builtin.template:
    src: .env.j2
    dest: "{{ immich.config_path }}/.env"
    owner: "{{ users.admin_user }}"
    group: "{{ users.admin_user }}"
    mode: "0644"

- name: Start Immich
  community.docker.docker_compose_v2:
    project_src: "{{ immich.config_path }}"
    state: present

- name: Wait for Immich to be ready
  ansible.builtin.wait_for:
    host: "{{ network.pi_ip }}"
    port: "{{ immich.port }}"
    delay: 30
    timeout: 180

- name: Display Immich access information
  ansible.builtin.debug:
    msg:
      - "Immich is now running!"
      - "Local Access: http://{{ network.pi_ip }}:{{ immich.port }}"
      - "Public Domain: https://{{ immich.domain }} (will be set via Nginx Proxy Manager)"

      - "Directory Structure:"
      - "- Upload Library: {{ immich.library_directory }}"
      - "- Database: {{ immich.database_directory }}"

      - "Next Steps:"
      - "1. Create your admin account on first access"
      - "2. Configure public access via Nginx Proxy Manager"
      - "3. Set up SSL certificate for the domain"
      - "4. Install the mobile app to start uploading photos"

# =============================================================================
# Immich Backup Configuration
# =============================================================================

- name: Create local backup directory
  ansible.builtin.file:
    path: "{{ immich.backup.local_directory }}"
    state: directory
    owner: "{{ users.admin_user }}"
    group: "{{ users.admin_user }}"
    mode: "0755"
  when: immich_db_password != "" and yandex_disk_token != ""

- name: Create log directory
  ansible.builtin.file:
    path: "{{ log_directory }}"
    state: directory
    owner: "{{ users.admin_user }}"
    group: "{{ users.admin_user }}"
    mode: "0755"
  when: immich_db_password != "" and yandex_disk_token != ""

- name: Create Immich backup script
  ansible.builtin.template:
    src: backup-immich.sh.j2
    dest: /usr/local/bin/backup-immich.sh
    mode: "0755"
    owner: "{{ users.admin_user }}"
    group: "{{ users.admin_user }}"
  when: immich_db_password != "" and yandex_disk_token != ""

- name: Create cron job for Immich backup
  ansible.builtin.cron:
    name: "Immich backup daily at 4 AM"
    minute: "0"
    hour: "4"
    job: "HOME=/home/{{ users.admin_user }} PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin /usr/local/bin/backup-immich.sh"
    user: "{{ users.admin_user }}"
    state: present
  when: immich_db_password != "" and yandex_disk_token != ""

- name: Display Immich backup configuration
  ansible.builtin.debug:
    msg:
      - "Immich backup has been configured!"
      - "Backup Schedule: Daily at 4:00 AM (via cron)"
      - "Local Backup Directory: {{ immich.backup.local_directory }}"
      - "Remote: {{ rclone.remote }}:{{ immich.backup.rclone_path }}"
      - "Retention: {{ immich.backup.retention_days }} days"
      - "To manually run a backup: /usr/local/bin/backup-immich.sh"
      - "To view cron job: crontab -l -u {{ users.admin_user }}"
      - "To view backup logs: Check {{ immich.backup.log_file }} or system logs"
  when: immich_db_password != "" and yandex_disk_token != ""
