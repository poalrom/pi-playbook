---
# =============================================================================
# Home Assistant Deployment
# =============================================================================

- name: Create Home Assistant directory
  ansible.builtin.file:
    path: "{{ home_assistant.config_path }}"
    state: directory
    owner: "{{ users.admin_user }}"
    group: "{{ users.admin_user }}"
    mode: "0755"

- name: Create Home Assistant config directory
  ansible.builtin.file:
    path: "{{ home_assistant.data_path }}"
    state: directory
    owner: "{{ users.admin_user }}"
    group: "{{ users.admin_user }}"
    mode: "0755"

- name: Create Mosquitto directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop:
    - path: "{{ home_assistant.mqtt.config_path }}"
      owner: root
      group: "1883"
      mode: "0750"
    - path: "{{ home_assistant.mqtt.data_path }}"
      owner: "1883"
      group: "1883"
      mode: "0750"

- name: Create Mosquitto configuration
  ansible.builtin.template:
    src: mosquitto.conf.j2
    dest: "{{ home_assistant.mqtt.config_path }}/mosquitto.conf"
    owner: root
    group: "1883"
    mode: "0640"
  register: home_assistant_mqtt_configuration

- name: Calculate MQTT credentials checksum
  ansible.builtin.set_fact:
    home_assistant_mqtt_credentials_checksum: >-
      {{ {'username': mqtt_broker_username, 'password': mqtt_broker_password}
      | to_json | hash('sha256') }}
  no_log: true

- name: Check MQTT credentials checksum
  ansible.builtin.stat:
    path: "{{ home_assistant.mqtt.config_path }}/.credentials.sha256"
  register: home_assistant_mqtt_credentials_checksum_file

- name: Check Mosquitto password file
  ansible.builtin.stat:
    path: "{{ home_assistant.mqtt.config_path }}/password_file"
  register: home_assistant_mqtt_password_file

- name: Read MQTT credentials checksum
  ansible.builtin.slurp:
    path: "{{ home_assistant.mqtt.config_path }}/.credentials.sha256"
  register: home_assistant_mqtt_credentials_checksum_contents
  when: home_assistant_mqtt_credentials_checksum_file.stat.exists
  no_log: true

- name: Determine whether MQTT credentials changed
  ansible.builtin.set_fact:
    home_assistant_mqtt_credentials_changed: >-
      {{ not home_assistant_mqtt_password_file.stat.exists or
      not home_assistant_mqtt_credentials_checksum_file.stat.exists or
      (home_assistant_mqtt_credentials_checksum_contents.content
      | default('') | b64decode | trim)
      != home_assistant_mqtt_credentials_checksum }}
  no_log: true

- name: Generate Mosquitto password file
  ansible.builtin.command:
    argv:
      - docker
      - run
      - --rm
      - -i
      - --user
      - "0:0"
      - --volume
      - "{{ home_assistant.mqtt.config_path }}:/mosquitto/config"
      - "{{ home_assistant.mqtt.image }}"
      - sh
      - -ec
      - >-
        IFS= read -r username;
        IFS= read -r password;
        umask 077;
        work_directory="$(mktemp -d /tmp/mqtt-password.XXXXXX)";
        plaintext_file="$work_directory/password_file";
        staged_file="";
        cleanup() {
          rm -f "$plaintext_file";
          rmdir "$work_directory" 2>/dev/null || true;
          if [ -n "$staged_file" ]; then
            rm -f "$staged_file";
          fi;
        };
        trap cleanup EXIT;
        trap 'exit 129' HUP;
        trap 'exit 130' INT;
        trap 'exit 143' TERM;
        printf '%s:%s\n' "$username" "$password" >"$plaintext_file";
        unset password;
        mosquitto_passwd -U "$plaintext_file";
        staged_file="$(mktemp /mosquitto/config/.password_file.XXXXXX)";
        cp "$plaintext_file" "$staged_file";
        chown 1883:1883 "$staged_file";
        chmod 0600 "$staged_file";
        mv -f "$staged_file" /mosquitto/config/password_file;
        staged_file=""
      - mqtt-password-file
    stdin: "{{ mqtt_broker_username }}\n{{ mqtt_broker_password }}"
    stdin_add_newline: true
  when:
    - home_assistant_mqtt_credentials_changed
    - not ansible_check_mode
  no_log: true

- name: Protect Mosquitto password file
  ansible.builtin.file:
    path: "{{ home_assistant.mqtt.config_path }}/password_file"
    owner: "1883"
    group: "1883"
    mode: "0600"
  when: not ansible_check_mode

- name: Save MQTT credentials checksum
  ansible.builtin.copy:
    content: "{{ home_assistant_mqtt_credentials_checksum }}\n"
    dest: "{{ home_assistant.mqtt.config_path }}/.credentials.sha256"
    owner: root
    group: root
    mode: "0600"
  when:
    - home_assistant_mqtt_credentials_changed
    - not ansible_check_mode
  no_log: true

- name: Calculate desired MQTT broker state checksum
  ansible.builtin.set_fact:
    home_assistant_mqtt_desired_state_checksum: >-
      {{
        {
          'credentials': home_assistant_mqtt_credentials_checksum,
          'configuration': (
            lookup('ansible.builtin.template', 'mosquitto.conf.j2')
            | hash('sha256')
          )
        }
        | to_json
        | hash('sha256')
      }}

- name: Check applied MQTT broker state checksum
  ansible.builtin.stat:
    path: "{{ home_assistant.mqtt.config_path }}/.applied.sha256"
  register: home_assistant_mqtt_applied_state_checksum_file

- name: Read applied MQTT broker state checksum
  ansible.builtin.slurp:
    path: "{{ home_assistant.mqtt.config_path }}/.applied.sha256"
  register: home_assistant_mqtt_applied_state_checksum_contents
  when: home_assistant_mqtt_applied_state_checksum_file.stat.exists

- name: Determine whether MQTT broker state must be applied
  ansible.builtin.set_fact:
    home_assistant_mqtt_state_apply_required: >-
      {{
        home_assistant_mqtt_configuration.changed or
        home_assistant_mqtt_credentials_changed or
        not home_assistant_mqtt_applied_state_checksum_file.stat.exists or
        (
          home_assistant_mqtt_applied_state_checksum_contents.content
          | default('')
          | b64decode
          | trim
        ) != home_assistant_mqtt_desired_state_checksum
      }}

- name: Check whether Yandex Smart Home is installed
  ansible.builtin.stat:
    path: "{{ home_assistant.data_path }}/custom_components/yandex_smart_home/manifest.json"
  register: home_assistant_yandex_smart_home_component

- name: Create Home Assistant docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ home_assistant.config_path }}/compose.yml"
    owner: "{{ users.admin_user }}"
    group: "{{ users.admin_user }}"
    mode: "0644"

- name: Create Home Assistant Google SERVICE_ACCOUNT.json
  ansible.builtin.template:
    src: SERVICE_ACCOUNT.json.j2
    dest: "{{ home_assistant.data_path }}/SERVICE_ACCOUNT.json"
    owner: "{{ users.admin_user }}"
    group: "{{ users.admin_user }}"
    mode: "0644"
  register: home_assistant_service_account_configuration

- name: Create Home Assistant configuration.yaml
  ansible.builtin.template:
    src: configuration.yml.j2
    dest: "{{ home_assistant.data_path }}/configuration.yaml"
    owner: "{{ users.admin_user }}"
    group: "{{ users.admin_user }}"
    mode: "0644"
    backup: true
  register: home_assistant_configuration

- name: Ensure Home Assistant include files exist
  ansible.builtin.copy:
    content: "{{ item.content }}"
    dest: "{{ home_assistant.data_path }}/{{ item.name }}"
    owner: "{{ users.admin_user }}"
    group: "{{ users.admin_user }}"
    mode: "0644"
    force: false
  loop:
    - { name: "automations.yaml", content: "[]\n" }
    - { name: "scripts.yaml", content: "{}\n" }
    - { name: "scenes.yaml", content: "[]\n" }

- name: Start Home Assistant
  community.docker.docker_compose_v2:
    project_src: "{{ home_assistant.config_path }}"
    state: present

- name: Apply Home Assistant stack configuration changes
  ansible.builtin.meta: flush_handlers

- name: Apply desired MQTT broker state
  community.docker.docker_compose_v2:
    project_src: "{{ home_assistant.config_path }}"
    state: present
    services:
      - mosquitto
    recreate: always
  when:
    - home_assistant_mqtt_state_apply_required
    - not ansible_check_mode

- name: Wait for Home Assistant to be ready
  ansible.builtin.wait_for:
    host: "{{ network.pi_ip }}"
    port: "{{ home_assistant.port }}"
    delay: 30
    timeout: 300

- name: Wait for MQTT broker to be ready
  ansible.builtin.wait_for:
    host: "{{ network.pi_ip }}"
    port: "{{ home_assistant.mqtt.port }}"
    delay: 2
    timeout: 60
  when: not ansible_check_mode

- name: Verify MQTT rejects anonymous clients
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - mosquitto
      - mosquitto_pub
      - -h
      - 127.0.0.1
      - -p
      - "{{ home_assistant.mqtt.port | string }}"
      - -t
      - ansible/mqtt-anonymous-test
      - -m
      - rejected
  register: home_assistant_mqtt_anonymous_test
  changed_when: false
  failed_when: >-
    home_assistant_mqtt_anonymous_test.rc == 0 or
    ('not authorised' not in (home_assistant_mqtt_anonymous_test.stderr | lower)
    and 'not authorized' not in (home_assistant_mqtt_anonymous_test.stderr | lower))
  when: not ansible_check_mode

- name: Verify authenticated MQTT publish and subscribe
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - -i
      - mosquitto
      - timeout
      - -k
      - "5"
      - "15"
      - sh
      - -ec
      - >-
        IFS= read -r MQTT_USERNAME;
        IFS= read -r MQTT_PASSWORD;
        mqtt_options() {
          printf '%s %s\n%s %s\n' -u "$MQTT_USERNAME" -P "$MQTT_PASSWORD";
        };
        smoke_test_token="$(cat /proc/sys/kernel/random/uuid)";
        smoke_test_topic="ansible/mqtt-smoke-test/$smoke_test_token";
        smoke_test_payload="ansible-ok-$smoke_test_token";
        cleanup() {
          mqtt_options | \
          mosquitto_pub -o /dev/stdin -h 127.0.0.1 \
          -p {{ home_assistant.mqtt.port }} \
          -t "$smoke_test_topic" -n -r;
        };
        fallback_cleanup() {
          result="$1";
          trap - EXIT TERM;
          cleanup || true;
          exit "$result";
        };
        trap 'fallback_cleanup "$?"' EXIT;
        trap 'fallback_cleanup 124' TERM;
        mqtt_options |
        mosquitto_pub -o /dev/stdin -h 127.0.0.1
        -p {{ home_assistant.mqtt.port }}
        -t "$smoke_test_topic" -m "$smoke_test_payload" -r;
        received_payload="$(mqtt_options |
        mosquitto_sub -o /dev/stdin -h 127.0.0.1
        -p {{ home_assistant.mqtt.port }}
        -t "$smoke_test_topic" -C 1 -W 10)";
        test "$received_payload" = "$smoke_test_payload";
        cleanup;
        unset MQTT_PASSWORD;
        trap - EXIT TERM
      - mqtt-smoke-test
    stdin: "{{ mqtt_broker_username }}\n{{ mqtt_broker_password }}"
    stdin_add_newline: true
  changed_when: false
  when: not ansible_check_mode
  no_log: true

- name: Save applied MQTT broker state checksum
  ansible.builtin.copy:
    content: "{{ home_assistant_mqtt_desired_state_checksum }}\n"
    dest: "{{ home_assistant.mqtt.config_path }}/.applied.sha256"
    owner: root
    group: root
    mode: "0600"
  when:
    - home_assistant_mqtt_state_apply_required
    - not ansible_check_mode

- name: Install HACS
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - homeassistant
      - bash
      - -c
      - wget -O - https://get.hacs.xyz | bash -
    creates: "{{ home_assistant.data_path }}/custom_components/hacs/manifest.json"
  register: home_assistant_hacs_installation

- name: Validate Home Assistant configuration after managed changes
  ansible.builtin.command:
    cmd: docker exec homeassistant python -m homeassistant --script check_config --config /config
  changed_when: false
  when: >-
    home_assistant_configuration.changed or
    home_assistant_service_account_configuration.changed or
    home_assistant_hacs_installation.changed

- name: Restart Home Assistant after configuration or HACS change
  community.docker.docker_compose_v2:
    project_src: "{{ home_assistant.config_path }}"
    state: present
    recreate: always
  when: >-
    home_assistant_configuration.changed or
    home_assistant_service_account_configuration.changed or
    home_assistant_hacs_installation.changed

- name: Wait for Home Assistant after configuration or HACS change
  ansible.builtin.wait_for:
    host: "{{ network.pi_ip }}"
    port: "{{ home_assistant.port }}"
    delay: 10
    timeout: 180
  when: >-
    home_assistant_configuration.changed or
    home_assistant_service_account_configuration.changed or
    home_assistant_hacs_installation.changed

- name: Display Home Assistant access information
  ansible.builtin.debug:
    msg:
      - "Home Assistant is now running!"
      - "Local Access: http://{{ network.pi_ip }}:{{ home_assistant.port }}"
      - "Public Domain: https://{{ home_assistant.domain }} (will be set via Nginx Proxy Manager)"
      - "Configuration directory: {{ home_assistant.data_path }}"
      - "MQTT broker: {{ network.pi_ip }}:{{ home_assistant.mqtt.port }} (LAN only)"
      - "Add MQTT in Home Assistant with broker 127.0.0.1 and the Vault credentials."
      - "Create your administrator account on first visit."
      - "Complete HACS setup in Settings > Devices & services > Add integration > HACS."
      - >-
        Yandex Smart Home is
        {{ 'installed; select the YAML entity filter.'
        if home_assistant_yandex_smart_home_component.stat.exists
        else 'not installed; install it manually through HACS/UI.' }}
