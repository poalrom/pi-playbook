---
# =============================================================================
# Home Assistant Deployment
# =============================================================================

- name: Create Home Assistant directory
  ansible.builtin.file:
    path: "{{ home_assistant.config_path }}"
    state: directory
    owner: "{{ users.admin_user }}"
    group: "{{ users.admin_user }}"
    mode: "0755"

- name: Create Home Assistant config directory
  ansible.builtin.file:
    path: "{{ home_assistant.data_path }}"
    state: directory
    owner: "{{ users.admin_user }}"
    group: "{{ users.admin_user }}"
    mode: "0755"

- name: Create Home Assistant docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ home_assistant.config_path }}/compose.yml"
    owner: "{{ users.admin_user }}"
    group: "{{ users.admin_user }}"
    mode: "0644"
  notify: Restart home-assistant

- name: Create Home Assistant Google SERVICE_ACCOUNT.json
  ansible.builtin.template:
    src: SERVICE_ACCOUNT.json.j2
    dest: "{{ home_assistant.data_path }}/SERVICE_ACCOUNT.json"
    owner: "{{ users.admin_user }}"
    group: "{{ users.admin_user }}"
    mode: "0644"
  register: home_assistant_service_account_configuration

- name: Create Home Assistant configuration.yaml
  ansible.builtin.template:
    src: configuration.yml.j2
    dest: "{{ home_assistant.data_path }}/configuration.yaml"
    owner: "{{ users.admin_user }}"
    group: "{{ users.admin_user }}"
    mode: "0644"
    backup: true
  register: home_assistant_configuration

- name: Ensure Home Assistant include files exist
  ansible.builtin.copy:
    content: "{{ item.content }}"
    dest: "{{ home_assistant.data_path }}/{{ item.name }}"
    owner: "{{ users.admin_user }}"
    group: "{{ users.admin_user }}"
    mode: "0644"
    force: false
  loop:
    - { name: "automations.yaml", content: "[]\n" }
    - { name: "scripts.yaml", content: "{}\n" }
    - { name: "scenes.yaml", content: "[]\n" }

- name: Start Home Assistant
  community.docker.docker_compose_v2:
    project_src: "{{ home_assistant.config_path }}"
    state: present

- name: Wait for Home Assistant to be ready
  ansible.builtin.wait_for:
    host: "{{ network.pi_ip }}"
    port: "{{ home_assistant.port }}"
    delay: 30
    timeout: 300

- name: Install HACS
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - homeassistant
      - bash
      - -c
      - wget -O - https://get.hacs.xyz | bash -
    creates: "{{ home_assistant.data_path }}/custom_components/hacs/manifest.json"
  register: home_assistant_hacs_installation

- name: Validate Home Assistant configuration after managed changes
  ansible.builtin.command:
    cmd: docker exec homeassistant python -m homeassistant --script check_config --config /config
  changed_when: false
  when: >-
    home_assistant_configuration.changed or
    home_assistant_service_account_configuration.changed or
    home_assistant_hacs_installation.changed

- name: Restart Home Assistant after configuration or HACS change
  community.docker.docker_compose_v2:
    project_src: "{{ home_assistant.config_path }}"
    state: present
    recreate: always
  when: >-
    home_assistant_configuration.changed or
    home_assistant_service_account_configuration.changed or
    home_assistant_hacs_installation.changed

- name: Wait for Home Assistant after configuration or HACS change
  ansible.builtin.wait_for:
    host: "{{ network.pi_ip }}"
    port: "{{ home_assistant.port }}"
    delay: 10
    timeout: 180
  when: >-
    home_assistant_configuration.changed or
    home_assistant_service_account_configuration.changed or
    home_assistant_hacs_installation.changed

- name: Display Home Assistant access information
  ansible.builtin.debug:
    msg:
      - "Home Assistant is now running!"
      - "Local Access: http://{{ network.pi_ip }}:{{ home_assistant.port }}"
      - "Public Domain: https://{{ home_assistant.domain }} (will be set via Nginx Proxy Manager)"
      - "Configuration directory: {{ home_assistant.data_path }}"
      - "Create your administrator account on first visit."
      - "Complete HACS setup in Settings > Devices & services > Add integration > HACS."
