---
# =============================================================================
# Frigate NVR Deployment
# =============================================================================

- name: Create Frigate directory
  ansible.builtin.file:
    path: "{{ frigate.config_path }}"
    state: directory
    owner: "{{ users.admin_user }}"
    group: "{{ users.admin_user }}"
    mode: "0755"

- name: Create Frigate media directory
  ansible.builtin.file:
    path: "{{ frigate.media_path }}"
    state: directory
    owner: "{{ users.admin_user }}"
    group: "{{ users.admin_user }}"
    mode: "0755"

- name: Create Frigate docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ frigate.config_path }}/compose.yml"
    owner: "{{ users.admin_user }}"
    group: "{{ users.admin_user }}"
    mode: "0644"
  notify: Restart frigate

- name: Create Frigate config.yml
  ansible.builtin.template:
    src: config.yml.j2
    dest: "{{ frigate.config_path }}/config.yml"
    owner: "{{ users.admin_user }}"
    group: "{{ users.admin_user }}"
    mode: "0600"
    backup: true
  notify: Restart frigate

- name: Start Frigate
  community.docker.docker_compose_v2:
    project_src: "{{ frigate.config_path }}"
    state: present

- name: Wait for Frigate to be ready
  ansible.builtin.wait_for:
    host: "{{ network.pi_ip }}"
    port: "{{ frigate.port }}"
    delay: 20
    timeout: 180

- name: Display Frigate access information
  ansible.builtin.debug:
    msg:
      - "Frigate is now running!"
      - "Web Interface: http://{{ network.pi_ip }}:{{ frigate.port }}"
      - "Recordings directory: {{ frigate.media_path }}/recordings"
      - "Camera: {{ frigate.camera_name }}"
      - "Continuous recording retention: {{ frigate.retention_days }} days"
