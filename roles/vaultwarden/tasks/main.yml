---
# =============================================================================
# Vaultwarden Deployment
# =============================================================================

- name: Create Vaultwarden directory
  ansible.builtin.file:
    path: "{{ vaultwarden.config_path }}"
    state: directory
    owner: "{{ users.admin_user }}"
    group: "{{ users.admin_user }}"
    mode: "0755"

- name: Create Vaultwarden data directory
  ansible.builtin.file:
    path: "{{ vaultwarden.data_path }}"
    state: directory
    owner: "{{ users.admin_user }}"
    group: "{{ users.admin_user }}"
    mode: "0755"

- name: Create Vaultwarden docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ vaultwarden.config_path }}/compose.yml"
    owner: "{{ users.admin_user }}"
    group: "{{ users.admin_user }}"
    mode: "0644"
  notify: Restart vaultwarden

- name: Start Vaultwarden
  community.docker.docker_compose_v2:
    project_src: "{{ vaultwarden.config_path }}"
    state: present

- name: Wait for Vaultwarden to be ready
  ansible.builtin.wait_for:
    host: "{{ network.pi_ip }}"
    port: "{{ vaultwarden.port }}"
    delay: 10
    timeout: 60

- name: Allow Vaultwarden on custom port from local network only
  ufw:
    rule: allow
    port: "{{ vaultwarden.port }}"
    proto: tcp
    src: "{{ network.local_subnet }}"
    comment: "Vaultwarden on custom port - local network only"

- name: Display Vaultwarden access information
  ansible.builtin.debug:
    msg:
      - "Vaultwarden is now running!"
      - "Local Access: http://{{ network.pi_ip }}:{{ vaultwarden.port }}"
      - "Public Domain: https://{{ vaultwarden.domain }} (will be set via Nginx Proxy Manager)"
      - "Data Directory: {{ vaultwarden.data_path }}"
      - "Next Steps:"
      - "1. Access the web interface to create your account"
      - "2. Configure public access via Nginx Proxy Manager"
      - "3. Set up SSL certificate for the domain"
      - "4. Install Bitwarden clients and connect to your self-hosted instance"
